services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aegis
      POSTGRES_PASSWORD: aegis
      POSTGRES_DB: aegis
    ports:
      - "5432:5432"

  aegis:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_ENV: development
      HTTP_ADDR: ":8080"
      GRPC_ADDR: ":9090"
      METRICS_ADDR: ":9091"
      REDIS_ADDRS: "redis:6379"
      POSTGRES_DSN: "postgres://aegis:aegis@postgres:5432/aegis?sslmode=disable"
      JWT_ISSUER: "http://localhost:9000"
      JWT_AUDIENCE: "aegis"
      JWKS_URL: "http://localhost:9000/.well-known/jwks.json"
      RATE_LIMIT_FAILURE_MODE: "open"
    depends_on:
      - redis
      - postgres
    ports:
      - "8080:8080"
      - "9090:9090"
      - "9091:9091"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./deployments/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9092:9090"

  grafana:
    image: grafana/grafana:latest
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"